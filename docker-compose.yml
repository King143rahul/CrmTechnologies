# ============================================================
# CRM Technology — Full Stack E-Commerce (Docker Compose)
# ============================================================
# Services: PostgreSQL, Redis, Meilisearch, Backend, Frontend
# Usage:    docker compose up --build
# ============================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medusa-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Event Bus + Cache) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Meilisearch (Search Engine) ──────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: crm-meilisearch
    restart: unless-stopped
    command: meilisearch --master-key mZonyHGKBTz_SgzA8XgzniOpFLdJmYAl_usKRXcFt6k
    environment:
      MEILI_MASTER_KEY: mZonyHGKBTz_SgzA8XgzniOpFLdJmYAl_usKRXcFt6k
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Medusa Backend ───────────────────────────────────────
  backend:
    build:
      context: ./crm-backend
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/medusa-db
      PGSSLMODE: disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret-change-in-production
      COOKIE_SECRET: supersecret-change-in-production
      STORE_CORS: http://localhost:8000,http://localhost:3000
      ADMIN_CORS: http://localhost:9000
      AUTH_CORS: http://localhost:9000,http://localhost:8000,http://localhost:3000
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: mZonyHGKBTz_SgzA8XgzniOpFLdJmYAl_usKRXcFt6k
      VAT_RATE: "15"
      NODE_ENV: production
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
    ports:
      - "9000:9000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/health || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Next.js Storefront ──────────────────────────────────
  frontend:
    build:
      context: ./crm-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://backend:9000
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: "pk_858f6bf32d7328ecf468a7f88ef53f6de1b34fb0a01f48c9fe0f31e3e35d5918"
    container_name: crm-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      MEDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: "pk_858f6bf32d7328ecf468a7f88ef53f6de1b34fb0a01f48c9fe0f31e3e35d5918"
      NEXT_PUBLIC_SEARCH_ENDPOINT: http://localhost:7700
      NEXT_PUBLIC_SEARCH_API_KEY: mZonyHGKBTz_SgzA8XgzniOpFLdJmYAl_usKRXcFt6k
      NEXT_PUBLIC_VAT_RATE: "15"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  meilisearch_data:
  backend_uploads:
