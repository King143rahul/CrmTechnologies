# ============================================================
# CRM Technology — Full Stack E-Commerce (Docker Compose)
# ============================================================
# Services: PostgreSQL, Redis, Meilisearch, Backend, Frontend
# Usage:    docker compose up --build
# ============================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medusa-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Event Bus + Cache) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Meilisearch (Search Engine) ──────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: crm-meilisearch
    restart: unless-stopped
    command: meilisearch --master-key mZonyHGKBTz_SgzA8XgzniOpFLdJmYAl_usKRXcFt6k
    environment:
      MEILI_MASTER_KEY: mZonyHGKBTz_SgzA8XgzniOpFLdJmYAl_usKRXcFt6k
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Medusa Backend ───────────────────────────────────────
  backend:
    build:
      context: ./crm-backend
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/medusa-db?sslmode=disable
      PGSSLMODE: disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret-change-in-production
      COOKIE_SECRET: supersecret-change-in-production
      STORE_CORS: http://localhost:8000
      ADMIN_CORS: http://localhost:9000
      AUTH_CORS: http://localhost:9000,http://localhost:8000
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: mZonyHGKBTz_SgzA8XgzniOpFLdJmYAl_usKRXcFt6k
      VAT_RATE: "15"
      NODE_ENV: production
    ports:
      - "9000:9000"
    volumes:
      - backend_uploads:/app/uploads

  # ── Next.js Storefront ──────────────────────────────────
  frontend:
    build:
      context: ./crm-frontend
      dockerfile: Dockerfile
    container_name: crm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ""
      NEXT_PUBLIC_SEARCH_ENDPOINT: http://localhost:7700
      NEXT_PUBLIC_SEARCH_API_KEY: mZonyHGKBTz_SgzA8XgzniOpFLdJmYAl_usKRXcFt6k
      NEXT_PUBLIC_VAT_RATE: "15"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  meilisearch_data:
  backend_uploads:
